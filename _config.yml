urls:
  email:      mailto:info@keyboardkit.com
  email-business-license: mailto:info@keyboardkit.com?subject=Business%License
  email-custom-terms: mailto:info@keyboardkit.com?subject=Custom%20Terms
  rss:        https://keyboardkit.com/feed.xml

  business:     /business-licenses
  faq:          /faq
  case-studies: /case-studies
  escrow:       /features/escrow
  terminology:  /terminology

  appstore:   https://itunes.apple.com/app/keyboardkit/id1568444977
  blog:       /blog
  bluesky:    https://bsky.app/profile/keyboardkit.bsky.social
  docs:       https://docs.keyboardkit.com
  github:     https://github.com/KeyboardKit/KeyboardKit
  gumroad:    https://kankoda.gumroad.com/l/keyboardkitpro
  issues:     https://github.com/KeyboardKit/KeyboardKit/issues
  mastodon:   https://techhub.social/@keyboardkit
  newsletter: https://kankoda.gumroad.com/subscribe
  pricing:    /pricing
  reddit:     https://www.reddit.com/r/KeyboardKit
  twitter:    https://twitter.com/keyboardkitsdk

  swift:      https://www.swift.org
  swiftui:    https://developer.apple.com/xcode/swiftui/

google-analytics:
  measurement-id: G-XJ0HPZDSM3

header:
  title: KeyboardKit
  icon: /assets/icon/header.png
  pages:
    - pages/about.md
    - pages/features.md
    - pages/blog.md
    - pages/pricing.md

footer:
  sitemap:
    - index.html
    - pages/about.md
    - pages/faq.md
    - pages/features.md
    - pages/app/app.md
    - pages/case-studies.md
    - pages/documentation.md

collections_dir: collections

collections:
  case-studies:
    output: true
    permalink: /case-studies/:name
  features:
    output: true
    permalink: /features/:name
  posts:
    output: true
    permalink: /blog/:categories/:year/:month/:day/:title

baseurl: ""
theme: minima
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

include: [".well-known"]

plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap

defaults:
  -
    scope:
      type: "pages"
    values:
      layout: page
      image: /assets/headers/keyboardkit.jpg
  -
    scope:
      type: "case-studies"
    values:
      layout: side-menu-page
      subtitle-color: purple
      back-link:
        title: Case studies
        url: /case-studies
  -
    scope:
      type: "features"
    values:
      layout: feature
      assets: /assets/features/
      eyebrow: Feature
      subtitle-color: blue
      back-link:
        title: Features
        url: /features
      side-menu-append:
        - title: Documentation
          anchor: documentation

  -
    scope:
      type: "posts"
    values:
      layout: post
      author: danielsaidi
      image:  /assets/headers/blog.jpg
      back-link:
        title: Blog
        url: /blog

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
